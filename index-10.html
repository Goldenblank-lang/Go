<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Golden Blank - القائمة الحصرية</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F5EDD9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #B8922A;
            --gold-light: #D4AF37;
            --cream: #F5EDD9;
            --beige: #EDE0C4;
            --beige-dark: #D9C9A8;
            --warm-white: #FAF6EE;
            --stone: #8C7B5E;
            --stone-light: #B5A48A;
            --text-dark: #3A2E1E;
            --text-mid: #6B5A3E;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: var(--cream); color: var(--text-dark);
            font-family: 'Tajawal', sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        /* تحذير الوضع العمودي */
        #rotate-warning {
            display: none; position: fixed; inset: 0; z-index: 99999;
            background: var(--cream); flex-direction: column;
            justify-content: center; align-items: center; gap: 20px; text-align: center; padding: 30px;
        }
        #rotate-warning svg { width: 80px; height: 80px; stroke: var(--gold); fill: none; stroke-width: 1.5; animation: rotateIcon 2s infinite ease-in-out; }
        @keyframes rotateIcon { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
        #rotate-warning p { font-size: 1.4rem; color: var(--text-dark); font-weight: 600; }
        @media (orientation: portrait)  { #rotate-warning{display:flex} #app-container{display:none} }
        @media (orientation: landscape) { #rotate-warning{display:none}  #app-container{display:block} }

        /* رمز المرور */
        #pin-overlay {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(58,46,30,0.92); backdrop-filter: blur(10px);
            justify-content: center; align-items: center; flex-direction: column; gap: 20px;
        }
        #pin-overlay.active { display: flex; }
        #pin-box {
            background: var(--warm-white); border-radius: 20px; padding: 40px 50px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            border: 1px solid rgba(184,146,42,0.3); box-shadow: 0 20px 60px rgba(0,0,0,0.3); min-width: 320px;
        }
        #pin-box h2 { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--text-dark); }
        #pin-input {
            width: 100%; padding: 14px 20px; border: 2px solid var(--beige-dark); border-radius: 10px;
            font-size: 1.2rem; font-family: 'Tajawal', sans-serif; text-align: center;
            background: var(--cream); color: var(--text-dark); outline: none; letter-spacing: 4px; transition: border-color 0.3s;
        }
        #pin-input:focus { border-color: var(--gold); }
        #pin-input.error { border-color: #dc3545; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        #pin-error { color: #dc3545; font-size: 0.95rem; display: none; }
        .pin-btns { display: flex; gap: 12px; width: 100%; }
        .pin-btn { flex:1; padding:12px; border:none; border-radius:10px; font-size:1rem; font-family:'Tajawal',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .pin-btn-cancel { background: var(--beige); color: var(--stone); }
        .pin-btn-confirm { background: var(--gold); color: white; }
        .pin-btn:active { transform: scale(0.97); }

        /* التطبيق */
        #app-container { width: 100%; height: 100%; }

        .category-nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px;
            background: rgba(245,237,217,0.88); backdrop-filter: blur(15px);
            padding: 8px 20px; border-radius: 50px;
            border: 1px solid rgba(184,146,42,0.4); box-shadow: 0 8px 30px rgba(58,46,30,0.15);
        }
        .nav-btn {
            background: transparent; border: none; color: var(--stone);
            font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 500;
            padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.3s;
        }
        .nav-btn.active { background: rgba(184,146,42,0.15); color: var(--gold); border: 1px solid rgba(184,146,42,0.4); }

        .settings-btn {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(245,237,217,0.5); border: 1px solid rgba(184,146,42,0.2);
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0; transition: opacity 0.3s;
        }
        .settings-btn svg { width: 18px; height: 18px; stroke: var(--stone); fill: none; stroke-width: 2; }

        /*
         * المجلة: الحاوية الرئيسية
         * نستخدم direction:ltr لأن dir=rtl يعكس scrollLeft
         * ونعيد rtl داخل كل صفحة
         */
        #magazine {
            position: fixed; inset: 0;
            direction: ltr;          /* مهم: لتصحيح scrollLeft */
            overflow: hidden;        /* نمنع الـ scroll الافتراضي كلياً */
        }

        /* الصفحات مرتبة أفقياً داخل حاوية بعرض كافٍ */
        #magazine-inner {
            display: flex;
            flex-direction: row-reverse;
            height: 100%;
            /* العرض يُحدد بالجافاسكريبت */
            /* الانتقال بـ transform لأنه أسرع وأدق */
            transition: transform 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .page {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100vh;
            display: flex;
            padding: 3vh 3vw;
            background: var(--cream);
            direction: rtl; /* نعيد RTL داخل كل صفحة */
        }

        /* الغلاف */
        .cover-page .page-content {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--warm-white) 0%, var(--beige) 100%);
            border-radius: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            border: 1px solid rgba(184,146,42,0.3); box-shadow: inset 0 0 60px rgba(184,146,42,0.05);
        }
        .cover-page .page-content::after {
            content:''; position:absolute; inset:15px;
            border: 1px solid rgba(184,146,42,0.4); border-radius: 10px; pointer-events: none;
        }
        .brand-name {
            font-family: 'Amiri', serif; font-size: clamp(3rem,7vw,6rem);
            color: var(--gold); margin-bottom: 20px; font-weight: 700;
            letter-spacing: 2px; text-shadow: 0 4px 20px rgba(184,146,42,0.25); text-align: center;
        }
        .swipe-hint {
            position: absolute; bottom: 40px; display: flex; flex-direction: column;
            align-items: center; gap: 15px; color: var(--gold); opacity: 0.7;
            font-size: 1.1rem; animation: swipeAnim 2s infinite ease-in-out;
        }
        .swipe-hint svg { width: 30px; height: 30px; fill: none; stroke: currentColor; stroke-width: 2; }
        @keyframes swipeAnim { 0%,100%{transform:translateX(0)} 50%{transform:translateX(12px)} }

        /* صفحة القسم */
        .section-divider .page-content {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--beige) 0%, var(--warm-white) 50%, var(--beige-dark) 100%);
            border-radius: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            border: 1px solid rgba(184,146,42,0.25); overflow: hidden;
            box-shadow: 0 10px 40px rgba(58,46,30,0.1);
        }
        .section-divider .page-content::before {
            content:''; position:absolute; width:150vw; height:150vw;
            background: radial-gradient(circle, rgba(184,146,42,0.08) 0%, transparent 55%);
            top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none;
        }
        .section-title { font-family:'Amiri',serif; font-size:clamp(3rem,6vw,5rem); color:var(--gold); margin-bottom:10px; position:relative; z-index:2; }
        .section-desc  { font-size:clamp(1.2rem,2vw,1.8rem); color:var(--stone); position:relative; z-index:2; }

        /* صفحة المنتج */
        .item-layout {
            width:100%; height:100%; display:flex; flex-direction:row;
            background:var(--warm-white); border-radius:20px; overflow:hidden;
            box-shadow:0 20px 50px rgba(58,46,30,0.15); border:1px solid rgba(184,146,42,0.2);
        }
        .item-image { flex:1; background:var(--beige); display:flex; justify-content:center; align-items:center; }
        .image-placeholder {
            font-family:'Amiri',serif; font-size:1.5rem; color:var(--stone-light);
            border:1px dashed var(--beige-dark); padding:40px 60px; border-radius:12px; text-align:center;
        }
        .item-info {
            flex:1; background:linear-gradient(180deg,var(--warm-white) 0%,var(--beige) 100%);
            padding:40px; display:flex; flex-direction:column;
            justify-content:center; align-items:center; text-align:center;
            border-right:1px solid rgba(184,146,42,0.15);
        }
        .item-name { font-family:'Amiri',serif; font-size:clamp(2.2rem,4vw,3.5rem); color:var(--text-dark); margin-bottom:20px; line-height:1.2; }
        .item-price {
            font-size:clamp(1.8rem,3vw,2.5rem); font-weight:700; color:var(--gold);
            font-family:'Tajawal',sans-serif; background:rgba(184,146,42,0.08);
            padding:10px 40px; border-radius:50px; border:1px solid rgba(184,146,42,0.3);
            transition: opacity 0.4s, transform 0.4s;
        }
        body.prices-hidden .item-price { opacity:0; pointer-events:none; transform:scale(0.8); }
    </style>
</head>
<body>

<!-- تحذير الوضع العمودي -->
<div id="rotate-warning">
    <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
    <p>يرجى تدوير الجهاز<br>للوضع الأفقي</p>
</div>

<!-- رمز المرور -->
<div id="pin-overlay">
    <div id="pin-box">
        <h2>🔐 رمز المرور</h2>
        <input type="password" id="pin-input" placeholder="أدخل الرمز السري" autocomplete="off" spellcheck="false">
        <p id="pin-error">❌ رمز خاطئ، حاول مرة أخرى</p>
        <div class="pin-btns">
            <button class="pin-btn pin-btn-cancel" onclick="cancelPin()">إلغاء</button>
            <button class="pin-btn pin-btn-confirm" onclick="checkPin()">تأكيد</button>
        </div>
    </div>
</div>

<!-- التطبيق -->
<div id="app-container">

    <nav class="category-nav" id="categoryNav">
        <button class="nav-btn" onclick="goToPage(0)">الحلويات</button>
    </nav>

    <button class="settings-btn" id="settingsBtn" onclick="showPinForExit()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </button>

    <div id="magazine">
        <div id="magazine-inner"></div>
    </div>

</div>

<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    // رمز المرور
    const SECRET_PIN = 'Aa12345678';
    function showPinForExit() {
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-error').style.display = 'none';
        document.getElementById('pin-input').classList.remove('error');
        document.getElementById('pin-overlay').classList.add('active');
        setTimeout(() => document.getElementById('pin-input').focus(), 100);
    }
    function cancelPin() {
        document.getElementById('pin-overlay').classList.remove('active');
    }
    function checkPin() {
        const val = document.getElementById('pin-input').value;
        if (val === SECRET_PIN) {
            document.getElementById('pin-overlay').classList.remove('active');
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            window.open('./admin.html', '_blank');
        } else {
            const inp = document.getElementById('pin-input');
            inp.classList.add('error');
            document.getElementById('pin-error').style.display = 'block';
            inp.value = '';
            setTimeout(() => inp.classList.remove('error'), 500);
        }
    }
    document.getElementById('pin-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPin();
        if (e.key === 'Escape') cancelPin();
    });

    // حماية الخروج
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => history.pushState(null, '', location.href));
    window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue = ''; });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key==='F5'||(e.ctrlKey&&'rRwWtTnNlL'.includes(e.key))||(e.altKey&&e.key==='F4')||(e.ctrlKey&&e.key==='F4')) {
            e.preventDefault(); e.stopPropagation(); return false;
        }
    });

    // Fullscreen
    function enterFullscreen() {
        const el = document.documentElement;
        const fn = el.requestFullscreen||el.mozRequestFullScreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
        if (fn) fn.call(el).catch(()=>{});
    }
    document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) setTimeout(enterFullscreen,500); });
    document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement) setTimeout(enterFullscreen,500); });
    document.addEventListener('touchstart', function f(){ enterFullscreen(); document.removeEventListener('touchstart',f); }, {once:true});
    document.addEventListener('click',      function f(){ enterFullscreen(); document.removeEventListener('click',f); },      {once:true});

    // زر الإعدادات بلمس طويل
    let lpt;
    const sBtn = document.getElementById('settingsBtn');
    document.addEventListener('touchstart', e => {
        const t = e.touches[0];
        if (t.clientX < 80 && t.clientY > window.innerHeight - 80) {
            lpt = setTimeout(() => { sBtn.style.opacity='1'; setTimeout(()=>{sBtn.style.opacity='0';},4000); }, 1500);
        }
    }, {passive:true});
    document.addEventListener('touchend', () => clearTimeout(lpt), {passive:true});

    // IndexedDB
    const DB_NAME='GoldenBlankDB', DB_VER=1, STORE='menuItems', SSTORE='settings';
    function openDB() {
        return new Promise((res,rej) => {
            const r = indexedDB.open(DB_NAME, DB_VER);
            r.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE))  db.createObjectStore(STORE,  {keyPath:'id'});
                if (!db.objectStoreNames.contains(SSTORE)) db.createObjectStore(SSTORE, {keyPath:'key'});
            };
            r.onsuccess = e => res(e.target.result);
            r.onerror   = e => rej(e.target.error);
        });
    }
    function getAllItems(db) {
        return new Promise((res,rej) => {
            const r = db.transaction(STORE,'readonly').objectStore(STORE).getAll();
            r.onsuccess = e => res(e.target.result);
            r.onerror   = e => rej(e.target.error);
        });
    }
    function putAllItems(db, items) {
        return new Promise((res,rej) => {
            const tx = db.transaction(STORE,'readwrite'), st = tx.objectStore(STORE);
            items.forEach(i => st.put(i));
            tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
        });
    }
    function getSetting(db, key) {
        return new Promise(res => {
            try {
                const r = db.transaction(SSTORE,'readonly').objectStore(SSTORE).get(key);
                r.onsuccess = e => res(e.target.result ? e.target.result.value : null);
                r.onerror   = () => res(null);
            } catch { res(null); }
        });
    }

    const defaultItems = [
        {id:301,category:'sweets',name:'كيك عسل',       price:'22 SAR',image:''},
        {id:302,category:'sweets',name:'كيك تمر',       price:'19 SAR',image:''},
        {id:303,category:'sweets',name:'حلا البيكان',   price:'18 SAR',image:''},
        {id:304,category:'sweets',name:'تشيز مدريد',    price:'22 SAR',image:''},
        {id:305,category:'sweets',name:'لافا شوكلت',    price:'18 SAR',image:''},
        {id:306,category:'sweets',name:'لافا بستاشيو',  price:'18 SAR',image:''},
        {id:307,category:'sweets',name:'بودينق شوكلت',  price:'16 SAR',image:''},
        {id:401,category:'sweets',name:'ماء',            price:'1 SAR', image:''},
        {id:402,category:'sweets',name:'اضافة شت اسبريسو',price:'10 SAR',image:''}
    ];

    // ===== نظام التنقل =====
    const inner = document.getElementById('magazine-inner');
    const mag   = document.getElementById('magazine');
    let totalPages  = 0;
    let currentPage = 0;

    function setPage(index, animate) {
        if (index < 0 || index >= totalPages) return;
        currentPage = index;
        // translateX سالب لأن الصفحات تبدأ من اليسار (direction:ltr على #magazine)
        inner.style.transition = animate
            ? 'transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94)'
            : 'none';
        inner.style.transform = `translateX(${-(totalPages-1-index) * 100}vw)`;
    }

    function goToPage(index) { setPage(index, true); }

    // اللمس — صفحة واحدة فقط
    let tx0=0, ty0=0, dx=0, locked=false, isH=false;

    mag.addEventListener('touchstart', e => {
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
        dx  = 0; locked = false; isH = false;
        // أوقف الانيميشن الحالي وثبّت الموضع
        const cur = new DOMMatrix(getComputedStyle(inner).transform).m41;
        inner.style.transition = 'none';
        inner.style.transform  = `translateX(${cur}px)`;
    }, {passive:true});

    mag.addEventListener('touchmove', e => {
        const ddx = e.touches[0].clientX - tx0;
        const ddy = e.touches[0].clientY - ty0;
        if (!locked) {
            if (Math.abs(ddx)<4 && Math.abs(ddy)<4) return;
            isH    = Math.abs(ddx) > Math.abs(ddy);
            locked = true;
        }
        if (!isH) return;
        e.preventDefault();
        dx = ddx;
        const base = -(totalPages-1-currentPage) * window.innerWidth;
        const resist = (currentPage===0&&ddx<0)||(currentPage===totalPages-1&&ddx>0) ? 0.25 : 1;
        inner.style.transform = `translateX(${base + dx*resist}px)`;
    }, {passive:false});

    mag.addEventListener('touchend', () => {
        if (!isH) return;
        const thr = window.innerWidth * 0.2;
        if      (dx >  thr && currentPage < totalPages-1) setPage(currentPage+1, true);
        else if (dx < -thr && currentPage > 0)            setPage(currentPage-1, true);
        else                                               setPage(currentPage,   true);
        resetIdle();
    }, {passive:true});

    // الأسعار والشريط
    function applyPrices(v) { document.body.classList.toggle('prices-hidden', v===false||v==='false'); }
    function applyNav(v) {
        const n = document.getElementById('categoryNav');
        if (n) n.style.display = (v===false||v==='false') ? 'none' : 'flex';
    }

    // بناء المنيو
    function buildMenu(items, showPrices, showNav) {
        applyPrices(showPrices);
        applyNav(showNav);

        inner.innerHTML = '';

        // غلاف
        inner.insertAdjacentHTML('beforeend',`
            <section class="page cover-page">
                <div class="page-content">
                    <h1 class="brand-name">Golden Blank</h1>
                    <div class="swipe-hint">
                        <span>اسحب للتصفح</span>
                        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </div>
                </div>
            </section>`);

        const sweets = items.filter(i => i.category==='sweets');
        if (sweets.length > 0) {
            sweets.forEach(item => {
                const img = item.image
                    ? `<img src="${item.image}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;">`
                    : `<div class="image-placeholder">${item.name}</div>`;
                inner.insertAdjacentHTML('beforeend',`
                    <section class="page">
                        <div class="item-layout">
                            <div class="item-image">${img}</div>
                            <div class="item-info">
                                <h2 class="item-name">${item.name}</h2>
                                <p class="item-price">${item.price}</p>
                            </div>
                        </div>
                    </section>`);
            });
        }

        totalPages  = inner.children.length;
        // عرض الحاوية = عدد الصفحات × 100vw
        inner.style.width = totalPages * 100 + 'vw';
        currentPage = 0;
        // بدون انيميشن في البداية
        inner.style.transition = 'none';
        inner.style.transform  = `translateX(${-(totalPages-1) * 100}vw)`;
    }

    // مؤقت العودة للغلاف
    let idleT;
    function resetIdle() {
        clearTimeout(idleT);
        idleT = setTimeout(() => setPage(0, true), 2*60*1000);
    }
    ['mousemove','mousedown','touchstart'].forEach(ev => window.addEventListener(ev, resetIdle, {passive:true}));
    resetIdle();

    // تحديث كل 30 ثانية
    async function refresh() {
        const db = await openDB();
        const [items, sp, sn] = await Promise.all([getAllItems(db), getSetting(db,'showPrices'), getSetting(db,'showNav')]);
        if (items?.length) buildMenu(items, sp, sn);
    }
    setInterval(refresh, 30000);

    // تشغيل
    (async () => {
        const db = await openDB();
        let items = await getAllItems(db);
        const [sp, sn] = await Promise.all([getSetting(db,'showPrices'), getSetting(db,'showNav')]);
        if (!items?.filter(i=>i.category==='sweets').length) {
            await putAllItems(db, defaultItems);
            items = defaultItems;
        }
        buildMenu(items, sp, sn);
    })();
</script>
</body>
</html>
